<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>AVEL | Nómina Pública</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; user-select: none; background-color: #f9fafb; }
        .bg-azul-app { background-color: #007bff; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="bg-azul-app py-6 shadow-lg border-b-4 border-[#e1ad01] flex-shrink-0 text-center">
        <h1 class="text-white text-2xl font-black uppercase tracking-tighter">Nómina <span class="text-[#e1ad01]">Atletas</span></h1>
    </header>

    <div class="container mx-auto p-4 flex-grow flex flex-col overflow-hidden">
        <div class="flex justify-between items-center mb-4 flex-shrink-0">
            <a href="index.html" class="text-[#007bff] font-black uppercase text-[10px] flex items-center gap-1">← Menú</a>
            
            <button onclick="window.accesoAdmin()" class="bg-[#007bff] text-white px-4 py-2 rounded-xl font-black uppercase text-[10px] shadow-lg flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-[#e1ad01]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                Gestionar Atletas
            </button>
        </div>

        <div class="bg-white p-3 rounded-2xl mb-4 border border-gray-100 flex-shrink-0 shadow-sm">
            <input type="text" id="busNom" onkeyup="window.filtrar()" placeholder="BUSCAR POR NOMBRE O CÉDULA..." class="w-full p-2 bg-gray-50 border rounded-lg outline-none font-bold text-[10px] uppercase">
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 flex-grow overflow-y-auto">
            <table class="min-w-full italic text-[11px]">
                <thead class="bg-[#007bff] text-white uppercase sticky top-0">
                    <tr>
                        <th class="px-4 py-3 text-left">Atleta / Cédula</th>
                        <th class="px-4 py-3 text-left">Club</th>
                        <th class="px-4 py-3 text-center">Estatus</th>
                    </tr>
                </thead>
                <tbody id="aTB" class="divide-y divide-gray-50">
                    </tbody>
            </table>
        </div>
        
        <div class="mt-2 text-right flex-shrink-0">
            <span id="contador" class="text-[#007bff] text-[9px] font-black uppercase italic">Cargando...</span>
        </div>
    </div>

    <footer class="bg-white py-4 border-t border-gray-100 text-center flex-shrink-0">
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em]">
            Desarrollado por <span class="text-[#007bff]">Sistematikos</span> - Frank Hernandez
        </p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/ciar_app.js"></script>
    <script>
        window.accesoAdmin = () => { 
            const p = prompt("INGRESE CLAVE DE ADMINISTRADOR:");
            if (p === "Avel2026Voley") { 
                sessionStorage.setItem('avel_auth','true'); 
                window.location.href="index_mdfciar.html"; 
            } else if (p !== null) {
                alert("❌ ACCESO DENEGADO");
            }
        };
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVEL | Data Ciar</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            user-select: none; 
            -webkit-user-select: none;
            background-color: #f9fafb;
        }
        .bg-azul-app { background-color: #007bff; }
        .btn-panel {
            background-color: #007bff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 6px solid #0056b3;
        }
        .btn-panel:hover {
            background-color: #0056b3;
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 123, 255, 0.4);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-azul-app py-10 shadow-xl border-b-4 border-[#e1ad01] flex-shrink-0">
        <div class="text-center px-4">
            <h1 class="text-white text-7xl md:text-8xl font-black tracking-tighter leading-none mb-2">AVEL</h1>
            <p class="text-[#e1ad01] text-[9px] font-black uppercase tracking-[0.4em] italic">Asociación de Voleibol del Estado Lara</p>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px]">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
            <div class="h-2 bg-[#e1ad01] w-full"></div>
            <div class="p-10 text-center">
                <p class="text-gray-400 font-bold text-[8px] uppercase tracking-[0.3em] mb-8 italic">Data Ciar - Gestión</p>
                
                <a href="index_listaciar.html" class="btn-panel group block w-full py-6 rounded-2xl flex flex-col items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-[#e1ad01]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="text-white font-black uppercase tracking-[0.2em] text-sm italic">Atletas CIAR</span>
                </a>
            </div>
        </div>
    </main>

    <footer class="bg-white py-5 border-t border-gray-200 text-center flex-shrink-0">
        <p class="text-gray-500 text-[10px] md:text-[11px] font-bold uppercase tracking-[0.2em]">
            Desarrollado por <span class="text-[#007bff]">Sistematikos</span> - Frank Hernandez
        </p>
    </footer>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                if (confirm("✨ SISTEMATIKOS:\n\n¿Deseas instalar 'Atletas CIAR' en tu pantalla de inicio?")) {
                    deferredPrompt.prompt();
                }
            }, 3000);
        });
    </script>
</body>
</html>

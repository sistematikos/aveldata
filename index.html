<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVEL | Data Ciar</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; user-select: none; background-color: #f9fafb; }
        .bg-azul-app { background-color: #007bff; }
        .btn-panel {
            background-color: #007bff;
            transition: all 0.3s ease;
            border-bottom: 6px solid #0056b3;
        }
        .btn-panel:hover { transform: translateY(-4px); shadow: 0 15px 35px rgba(0,123,255,0.4); }
        
        /* Estilos del Cartel Flotante */
        #pwa-toast {
            visibility: hidden;
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #e1ad01;
        }
        #pwa-toast.show {
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-azul-app py-10 shadow-xl border-b-4 border-[#e1ad01] flex-shrink-0 text-center">
        <h1 class="text-white text-7xl font-black tracking-tighter mb-2 italic">AVEL</h1>
        <p class="text-[#e1ad01] text-[10px] font-black uppercase tracking-[0.4em]">Asociación de Voleibol del Estado Lara</p>
    </header>

    <main class="flex-grow flex items-center justify-center p-6 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:20px_20px]">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100 p-10 text-center">
            <p class="text-gray-400 font-bold text-[8px] uppercase tracking-[0.3em] mb-8 italic">Data Ciar - Gestión</p>
            <a href="index_listaciar.html" class="btn-panel block w-full py-6 rounded-2xl flex flex-col items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-[#e1ad01]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                <span class="text-white font-black uppercase tracking-[0.2em] text-sm italic">Atletas CIAR</span>
            </a>
        </div>
    </main>

    <div id="pwa-toast" class="flex flex-col gap-4">
        <div class="flex items-center gap-4">
            <div class="bg-[#007bff] p-3 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#e1ad01]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            </div>
            <div>
                <h4 class="font-black text-xs uppercase text-gray-800">Instalar Aplicación</h4>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Optimizado por Sistematikos</p>
            </div>
        </div>
        <p class="text-[9px] text-gray-600 font-bold leading-tight uppercase italic">¿Deseas añadir Data Ciar a tu pantalla de inicio para un acceso rápido?</p>
        <div class="flex gap-2">
            <button onclick="hideToast()" class="flex-1 py-2 text-[10px] font-black uppercase text-gray-400 border border-gray-100 rounded-lg">Cerrar</button>
            <button onclick="installApp()" class="flex-1 py-2 text-[10px] font-black uppercase bg-[#007bff] text-white rounded-lg shadow-lg">Instalar Ahora</button>
        </div>
    </div>

    <footer class="bg-white py-5 border-t border-gray-100 text-center flex-shrink-0">
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em]">Desarrollado por <span class="text-[#007bff]">Sistematikos</span> - Frank Hernandez</p>
    </footer>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        const toast = document.getElementById('pwa-toast');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Mostrar cartel después de 4 segundos
            setTimeout(() => {
                toast.classList.add('show');
            }, 4000);
        });

        function hideToast() {
            toast.classList.remove('show');
        }

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('Usuario aceptó');
                }
                deferredPrompt = null;
                hideToast();
            }
        }

        window.addEventListener('appinstalled', () => {
            hideToast();
            alert("✅ ¡INSTALACIÓN COMPLETADA!");
        });
    </script>
</body>
</html>

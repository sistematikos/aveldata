<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AVEL | Gestión CIAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{font-family:'Inter',sans-serif;user-select:none;background-color:#f9fafb}</style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="bg-red-600 py-6 border-b-4 border-[#e1ad01] text-center flex-shrink-0">
        <h1 class="text-white text-2xl font-black uppercase tracking-tighter">Panel <span class="text-[#e1ad01]">Administrativo</span></h1>
    </header>
    <div class="container mx-auto p-4 flex-grow flex flex-col overflow-hidden">
        <div class="flex justify-between items-center mb-4">
            <a href="index_listaciar.html" class="text-red-600 font-black uppercase text-[10px]">← Salir</a>
            <button onclick="window.location.href='index_ciar.html'" class="bg-[#007bff] text-white px-5 py-2 rounded-xl font-black text-[10px]">Nuevo Atleta</button>
        </div>
        <div class="bg-white p-3 rounded-2xl mb-4 border border-gray-100 flex-shrink-0">
            <input type="text" id="busNom" onkeyup="window.filtrar()" placeholder="BUSCAR POR NOMBRE O CÉDULA..." class="w-full p-2 bg-gray-50 border rounded-lg outline-none font-bold text-[10px] uppercase">
        </div>
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 flex-grow overflow-y-auto">
            <table class="min-w-full italic text-[11px]">
                <thead class="bg-gray-800 text-white uppercase sticky top-0 text-[9px]">
                    <tr>
                        <th class="px-4 py-3 text-left">Atleta / Cédula</th>
                        <th class="px-4 py-3 text-center">Estatus</th>
                        <th class="px-4 py-3 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="aTB_Admin" class="divide-y divide-gray-50"></tbody>
            </table>
        </div>
    </div>
    <footer class="bg-white py-4 border-t border-gray-100 text-center flex-shrink-0">
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em]">Desarrollado por <span class="text-[#007bff]">Sistematikos</span> - Frank Hernandez</p>
    </footer>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/ciar_app.js"></script>
    <script>
        if (sessionStorage.getItem('avel_auth') !== 'true') { window.location.href = "index_listaciar.html"; }
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
